name: ML Model CI

on:
  push:
    branches-ignore:
      - main

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc[s3]  # adjust if using another remote

   

      # 5. Train the model
      - name: Train Model
        env:
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: python Build_my_first_GAN.py

      

      # 7. Upload model info artifact
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      # 8. Upload MLflow DB artifact
      - name: Upload MLflow DB
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 4. Download artifacts from validation
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow DB
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      # 5. Validate accuracy threshold
      - name: Validate Accuracy
        env:
          MLFLOW_URI: sqlite:///mlflow.db
        run: python check_threshold.py

      # 6. Build Docker image with the trained model
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg RUN_ID=$(cat model_info.txt) \
            -t ml-model:latest .