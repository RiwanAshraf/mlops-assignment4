name: ML Model CI

on:
  push:
    branches-ignore:
      - main

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install DVC
        run: pip install dvc

      - name: Pull Data
        run: dvc pull

      - name: Train Model
        env:
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️ Install dependencies
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 4️ Download the run ID artifact
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # 5️ Check accuracy threshold
      - name: Validate Accuracy
        env:
          MLFLOW_URI: ${{ secrets.MLFLOW_URI }}
        run: python check_threshold.py

      # 6️ Mock Docker build if threshold met
      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"